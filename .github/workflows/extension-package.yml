name: Extension package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-22.04
            blender-version: "5.1.2"
            blender-release-dir: Blender5.1
            blender-file: blender-5.1.2-linux-x64.tar.xz
          - platform: windows-x64
            runner: windows-2022
            blender-version: "5.1.2"
            blender-release-dir: Blender5.1
            blender-file: blender-5.1.2-windows-x64.zip
          - platform: windows-arm64
            runner: windows-11-arm
            blender-version: "5.1.2"
            blender-release-dir: Blender5.1
            blender-file: blender-5.1.2-windows-arm64.zip
          - platform: macos-arm64
            runner: macos-26
            blender-version: "5.1.2"
            blender-release-dir: Blender5.1
            blender-file: blender-5.1.2-macos-arm64.dmg
          - platform: macos-x64
            runner: macos-26-intel
            blender-version: "4.5.10"
            blender-release-dir: Blender4.5
            blender-file: blender-4.5.10-macos-x64.dmg
    env:
      BLENDER_URL: https://download.blender.org/release/${{ matrix.blender-release-dir }}/${{ matrix.blender-file }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1 \
            libx11-6 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxkbcommon0 \
            libxrender1 \
            libxxf86vm1 \
            ninja-build \
            xz-utils

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - id: py311
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - id: py313
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download Blender on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -L -o blender.tar.xz "$BLENDER_URL"
          tar -xf blender.tar.xz
          BLENDER_BIN="$(find "$PWD" -maxdepth 2 -type f -path "*/blender" | head -n 1)"
          echo "BLENDER_BIN=${BLENDER_BIN}" >> "$GITHUB_ENV"

      - name: Download Blender on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -L -o blender.dmg "$BLENDER_URL"
          hdiutil attach -nobrowse blender.dmg
          BLENDER_BIN="$(find /Volumes -path "*/Blender.app/Contents/MacOS/Blender" -type f | head -n 1)"
          echo "BLENDER_BIN=${BLENDER_BIN}" >> "$GITHUB_ENV"

      - name: Download Blender on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "$env:BLENDER_URL" -OutFile blender.zip
          Expand-Archive -Path blender.zip -DestinationPath .
          $blender = Get-ChildItem -Path . -Recurse -Filter blender.exe | Select-Object -First 1
          "BLENDER_BIN=$($blender.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build and package extension
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python3 tools/release_extension.py \
            --blender "$BLENDER_BIN" \
            --platform "${{ matrix.platform }}" \
            --native-wheels \
            --assetkit-root "$PWD/deps/assetkit" \
            --python "${{ steps.py313.outputs.python-path }}" \
            --extra-python "${{ steps.py311.outputs.python-path }}"

      - name: Build and package extension
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python tools\release_extension.py `
            --blender "$env:BLENDER_BIN" `
            --platform "${{ matrix.platform }}" `
            --native-wheels `
            --assetkit-root "$pwd\deps\assetkit" `
            --python "${{ steps.py313.outputs.python-path }}" `
            --extra-python "${{ steps.py311.outputs.python-path }}"

      - name: Check animation roundtrip
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          "$BLENDER_BIN" --background --factory-startup \
            --python tools/blender_animation_roundtrip_check.py -- \
            --asset-cache "$RUNNER_TEMP/assetkit-import-suite" \
            --out "$RUNNER_TEMP/assetkit-animation-roundtrip"

      - name: Check mesh data reuse
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          "$BLENDER_BIN" --background --factory-startup \
            --python tools/blender_mesh_reuse_check.py -- \
            --out "$RUNNER_TEMP/assetkit-mesh-reuse"

      - uses: actions/upload-artifact@v7
        with:
          name: assetkit-blender-${{ matrix.platform }}
          path: dist/*.zip

  release:
    name: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: assetkit-blender-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -name '*.zip' | sort)
          if [ "${#assets[@]}" -ne 5 ]; then
            printf 'Expected 5 platform zip assets, found %s:\n' "${#assets[@]}" >&2
            find release-assets -maxdepth 2 -type f -print >&2
            exit 1
          fi

          printf 'Release assets:\n'
          printf '  %s\n' "${assets[@]}"

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi
